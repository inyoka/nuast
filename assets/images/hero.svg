<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320" role="img" aria-label="Illustration of code on a screen">
  <!--
    Hero Illustration Placeholder
    Replace this file with your own image or illustration.
    Recommended size: 960×640 px PNG (the SVG will scale, but a raster
    image at 2× resolution looks sharper on high-DPI screens).
  -->

  <!-- Background card -->
  <rect x="20" y="20" width="440" height="280" rx="16"
        fill="#16213e" stroke="#1e6bb8" stroke-width="1.5"/>

  <!-- "Traffic light" dots -->
  <circle cx="48" cy="48" r="7" fill="#ff5f57"/>
  <circle cx="68" cy="48" r="7" fill="#febc2e"/>
  <circle cx="88" cy="48" r="7" fill="#28c840"/>

  <!-- Fake code lines -->
  <rect x="48"  y="72" width="100" height="10" rx="5" fill="#1e6bb8" opacity="0.9"/>
  <rect x="156" y="72" width="60"  height="10" rx="5" fill="#f5a623" opacity="0.9"/>
  <rect x="224" y="72" width="80"  height="10" rx="5" fill="#5bbcd6" opacity="0.9"/>

  <rect x="48"  y="96" width="40"  height="10" rx="5" fill="#f5a623" opacity="0.9"/>
  <rect x="96"  y="96" width="120" height="10" rx="5" fill="#e8eaf6" opacity="0.7"/>

  <rect x="72"  y="120" width="80"  height="10" rx="5" fill="#5bbcd6" opacity="0.9"/>
  <rect x="160" y="120" width="50"  height="10" rx="5" fill="#e8eaf6" opacity="0.7"/>
  <rect x="218" y="120" width="90"  height="10" rx="5" fill="#1e6bb8" opacity="0.9"/>

  <rect x="48"  y="144" width="60"  height="10" rx="5" fill="#28c840" opacity="0.9"/>
  <rect x="116" y="144" width="40"  height="10" rx="5" fill="#e8eaf6" opacity="0.7"/>
  <rect x="164" y="144" width="100" height="10" rx="5" fill="#f5a623" opacity="0.9"/>

  <rect x="72"  y="168" width="150" height="10" rx="5" fill="#e8eaf6" opacity="0.7"/>

  <rect x="48"  y="192" width="80"  height="10" rx="5" fill="#1e6bb8" opacity="0.9"/>
  <rect x="136" y="192" width="60"  height="10" rx="5" fill="#5bbcd6" opacity="0.9"/>
  <rect x="204" y="192" width="50"  height="10" rx="5" fill="#e8eaf6" opacity="0.5"/>

  <!-- Blinking cursor -->
  <rect x="48" y="216" width="10" height="16" rx="2" fill="#f5a623" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Footer hint text -->
  <text x="240" y="296" text-anchor="middle"
        font-family="monospace" font-size="11" fill="#e8eaf6" opacity="0.35">
    Replace this image with assets/images/hero.svg or hero.png
  </text>
</svg>
